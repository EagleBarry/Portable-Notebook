<!doctype html>
<html>
	<head>
		<title>Notes Tabs</title>
		<style>
			body {
				width: 400px;
				height: 500px;
				margin: 0;
				padding: 0;
				font-family: Arial, sans-serif;
			}
			.tab-bar {
				display: flex;
				border-bottom: 1px solid #ccc;
				padding: 5px;
				background-color: #f1f1f1;
			}
			.tab {
				display: flex;
				justify-content: space-between; /* Pushes name to the left and close button to the right */
				align-items: center; /* Vertically centers the name and close button */
				padding: 8px 12px;
				margin-right: 5px;
				background-color: #ddd;
				border-radius: 5px 5px 0 0;
				cursor: pointer;
				max-width: 200px; /* Optional: Prevents tabs from becoming too wide */
				overflow: hidden;
			}
			.tab-name {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.tab.active {
				background-color: #029139;
				font-weight: bold;
			}
			.tab-close {
				margin-left: 8px;
				cursor: pointer;
				font-weight: bold;
				color: #555;
			}
			.tab-close:hover {
				color: #000;
			}
			.add-tab {
				margin-left: auto;
				padding: 8px;
				background-color: #4caf50;
				color: white;
				border: none;
				border-radius: 3px;
				cursor: pointer;
			}
			.content {
				padding: 10px;
				height: calc(100% - 40px);
				overflow-y: auto;
			}
			textarea {
				width: 100%;
				height: 100%;
				border: 1px solid #ccc;
				padding: 8px;
				box-sizing: border-box;
			}

			.modal {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background-color: rgba(0, 0, 0, 0.5);
				z-index: 1000;
				justify-content: center;
				align-items: center;
			}
			.modal-content {
				background-color: white;
				padding: 20px;
				border-radius: 5px;
				width: 80%;
				max-width: 300px;
			}
			.modal-content input {
				width: 100%;
				padding: 8px;
				margin-bottom: 10px;
				box-sizing: border-box;
			}
			.modal-buttons {
				display: flex;
				justify-content: flex-end;
				gap: 10px;
			}
			.modal-buttons button {
				padding: 8px 12px;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div class="tab-bar">
			<div id="tabs"></div>
			<button class="add-tab" id="addTab">+ Add Tab</button>
		</div>
		<div class="content">
			<textarea id="noteContent"></textarea>
		</div>

		<div class="modal" id="NameModal">
			<div class="modal-content">
				<h3>Name Tab</h3>
				<input type="text" id="newTabName" placeholder="Enter new name" />
				<div class="modal-buttons">
					<button id="cancelName">Cancel</button>
					<button id="confirmName">Name</button>
				</div>
			</div>
		</div>

		<div class="modal" id="deleteModal">
			<div class="modal-content">
				<h3>Delete Tab</h3>
				<p id="deleteModalMessage">Are you sure you want to delete this tab?</p>
				<div class="modal-buttons">
					<button id="cancelDelete">Cancel</button>
					<button id="confirmDelete">Delete</button>
				</div>
			</div>
		</div>

		<script src="main.js"></script>
	</body>
</html>
