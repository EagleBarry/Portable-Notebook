<!doctype html>
<html>
	<head>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div id="my-custom-area">
			<div class="tab-bar">
				<div id="tabs"></div>
				<button class="add-tab" id="addTab">+ Add Tab</button>
			</div>
		</div>

		<textarea id="noteContent"></textarea>

		<div class="modal" id="NameModal">
			<div class="modal-content">
				<h3>Name Tab</h3>
				<input type="text" id="newTabName" placeholder="Enter new name" />
				<div class="modal-buttons">
					<button id="cancelName">Cancel</button>
					<button id="confirmName">Confirm</button>
				</div>
			</div>
		</div>

		<div class="modal" id="deleteModal">
			<div class="modal-content">
				<h3>Delete Tab</h3>
				<p id="deleteModalMessage">Are you sure you want to delete this tab?</p>
				<div class="modal-buttons">
					<button id="cancelDelete">Cancel</button>
					<button id="confirmDelete">Delete</button>
				</div>
			</div>
		</div>

		<div id="transferModal">
			<div id="transferModalInner">
				<h3>Send Tab Data To:</h3>
				<div id="transferTabList"></div>
				<div id="transferModalButtons">
					<button id="cancelTransfer">Cancel</button>
					<button id="confirmTransfer">Send</button>
				</div>
			</div>
		</div>

		<script src="scripts/popup.js"></script>
		<script src="scripts/contextMenu.js"></script>
		<script src="scripts/tabs.js"></script>
		<script src="scripts/modals.js"></script>
		<script src="scripts/storage.js"></script>
	</body>
</html>
